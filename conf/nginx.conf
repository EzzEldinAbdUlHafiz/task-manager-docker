worker_processes auto;  # lit nginx choose how many workers it need by itself

# define how Nginx's worker processes handle incoming network connections
events {
    worker_connections 1024; # each worker will handle 1024 connection at once
}

# how should web traffic work
http {
    include       /etc/nginx/mime.types; # load the file that teaches nginx what kind of file each extension is. Without this, the browser might not know what kind of file it got.
    default_type  application/octet-stream; # If Nginx doesn’t know what kind of file something is, treat it like a generic file.

    # This is the app behind Nginx that will do the real work. task-manager is the name I choosed to call the backend
    upstream task-manager { 
        least_conn; # Send the next visitor to the server that is currently the least busy.
        server flask-app:8000; # The real app lives at the Docker service named flask-app on port 8000
    }

    # This creates a speed limit rule.
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s; # Each visitor is allowed to send 10 requests per second. This helps stop spam or too many fast requests.
    
    # When people come in a certain way, do these things.
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri; # If someone comes using HTTP, send them to HTTPS instead
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/ssl/certs/selfsigned.crt; # This tells Nginx where the certificate file is.
        ssl_certificate_key /etc/ssl/private/selfsigned.key; # This tells Nginx where the private key is. The key is like the secret key that matches the certificate. Certificate + key = HTTPS works.
        ssl_protocols       TLSv1.2 TLSv1.3; # Only allow modern secure encryption methods.
        
        # When someone asks for /static/..., get the file directly from this folder.
        location /static/ {
            alias /var/www/taskmanager/static/; # Nginx serves static files itself. That is faster than asking Flask to do it.
        }


        location /api/ {
            # limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://task-manager; # Send this request to the backend group called task-manager. Nginx is basically forwarding the request to Flask.
            # proxy_http_version 1.1;
            proxy_set_header Host $host; # Tell Flask what host the user originally asked for.
            # proxy_set_header X-Real-IP $remote_addr; # Tell Flask the real IP address of the visitor. So Flask knows who the real user is, not just that Nginx forwarded the request.
            # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Keep a list of all IPs that the request passed through.
            # proxy_set_header X-Forwarded-Proto https; # Tell Flask that the original request used HTTPS.
        }

        location / {
            # limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://task-manager;
            # proxy_http_version 1.1;
            proxy_set_header Host $host;
            # proxy_set_header X-Real-IP $remote_addr;
            # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # proxy_set_header X-Forwarded-Proto https;
        }
    }
}

# Nginx can use helpers to handle visitors
# it knows file types
# it has one backend app called task-manager
# that backend is actually flask-app:8000
# HTTP traffic on port 80 gets redirected to HTTPS
# HTTPS traffic on port 443 is allowed with your certificate
# /static/ files are served directly by Nginx
# /api/ requests are sent to Flask
# / requests are also sent to Flask
# Flask receives useful info like host, IP, and protocol

# Nginx is like a building guard:

# if someone comes to the normal door (80), the guard says: “Go to the secure door.”
# if someone asks for static files, the guard gives them directly
# if someone asks for API or homepage, the guard sends them to Flask
# the guard also tells Flask:
    # who the visitor is
    # what they asked for
    # that they came through the secure entrance